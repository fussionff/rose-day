<!DOCTYPE html>
<html>
<head>
<title>Rose Poetry for Deepa</title>
<style>
body{
    background:#fff0f5;
    font-family:Georgia;
    text-align:center;
    padding:40px;
}
.poem{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
a{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#cc0000;
    color:white;
    text-decoration:none;
    border-radius:20px;
}
.fall {
    position: fixed;
    top: -10%;
    font-size: 24px;
    animation: fall 6s linear infinite;
    opacity: 0.8;
    z-index: 1;
}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
    }
}
</style>
</head>
<body>
<!-- Falling Hearts & Roses -->
<div class="fall" style="left:5%; animation-delay:0s;">❤️</div>
<div class="fall" style="left:15%; animation-delay:2s;">🌹</div>
<div class="fall" style="left:25%; animation-delay:4s;">💖</div>
<div class="fall" style="left:35%; animation-delay:1s;">🌹</div>
<div class="fall" style="left:45%; animation-delay:3s;">❤️</div>
<div class="fall" style="left:55%; animation-delay:5s;">💘</div>
<div class="fall" style="left:65%; animation-delay:2s;">🌹</div>
<div class="fall" style="left:75%; animation-delay:4s;">❤️</div>
<div class="fall" style="left:85%; animation-delay:1s;">💖</div>

<div class="poem">
<h2>🌹 For My pyara sa bacha 🌹</h2>

<p>
Tum ek rose ho meri zindagi ka,<br>
Jo har din aur khoobsurat khilta hai 🌹<br><br>

Tumhari smile meri taqat hai,<br>
Aur tumhara pyaar meri duniya ❤️<br><br>

Is Rose Day bas itna kehna hai,<br>
I Love You babu… aaj bhi, kal bhi 💕
</p>

<a href="index.html">⬅ Back</a>
</div>

</body>
</html>
