<!DOCTYPE html>
<html>
<head>
<title>Happy Rose Day Deepa</title>
<style>
body{
    background: linear-gradient(#ffb3b3,#ffe6e6);
    font-family: Arial;
    text-align:center;
    padding-top:40px;
}
.card{
    background:white;
    width:320px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid red;
}
a{
    display:block;
    margin:10px;
    padding:10px;
    background:#cc0000;
    color:white;
    text-decoration:none;
    border-radius:20px;
}
a:hover{background:#ff3333;}
.fall {
    position: fixed;
    top: -10%;
    font-size: 24px;
    animation: fall 6s linear infinite;
    opacity: 0.8;
    z-index: 1;
}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
    }
}
</style>
</head>
<body>
<!-- Falling Hearts & Roses -->
<div class="fall" style="left:5%; animation-delay:0s;">❤️</div>
<div class="fall" style="left:15%; animation-delay:2s;">🌹</div>
<div class="fall" style="left:25%; animation-delay:4s;">💖</div>
<div class="fall" style="left:35%; animation-delay:1s;">🌹</div>
<div class="fall" style="left:45%; animation-delay:3s;">❤️</div>
<div class="fall" style="left:55%; animation-delay:5s;">💘</div>
<div class="fall" style="left:65%; animation-delay:2s;">🌹</div>
<div class="fall" style="left:75%; animation-delay:4s;">❤️</div>
<div class="fall" style="left:85%; animation-delay:1s;">💖</div>

<div class="card">
    <img src="deepa.jpg.jpegS">
    <h1>🌹 Happy Rose Day betu 🌹</h1>
    <p>You are my forever rose ❤️</p>

    <a href="poetry.html">📜 Read Poetry</a>
    <a href="game.html">🎮 Play Rose Game</a>
</div>

</body>
</html>
